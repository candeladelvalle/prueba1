<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Modelo 3D</title>

  <!-- Carga model-viewer de Google -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: white;
      height: 100vh;
      overflow: hidden;
    }
    
    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: #1a1a1a;
      --poster-color: transparent;
    }

    /* Botón de AR personalizado */
    #ar-button {
      background-color: #0066cc;
      color: white;
      border: none;
      border-radius: 24px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #ar-button:hover {
      background-color: #0052a3;
    }

    #ar-button:disabled {
      background-color: #555;
      cursor: not-allowed;
    }

    /* Logo info */
    #info {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 14px;
      z-index: 10;
    }

    /* Loading */
    .progress-bar {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      padding: 20px 40px;
      border-radius: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="info">📱 Tu modelo 3D en AR</div>

  <model-viewer
    id="viewer"
    src="modelo.glb"
    alt="Modelo 3D"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    camera-controls
    touch-action="pan-y"
    auto-rotate
    auto-rotate-delay="3000"
    rotation-per-second="20deg"
    shadow-intensity="1"
    environment-image="neutral"
    exposure="1.2"
    loading="eager"
  >
    <!-- Botón AR personalizado -->
    <button slot="ar-button" id="ar-button">
      👁️ Ver en AR
    </button>

    <!-- Mensaje de carga -->
    <div slot="progress-bar" class="progress-bar">
      Cargando modelo...
    </div>
  </model-viewer>

  <script>
    const viewer = document.getElementById('viewer');
    
    viewer.addEventListener('load', () => {
      console.log('✅ Modelo cargado');
    });

    viewer.addEventListener('error', (e) => {
      console.error('❌ Error:', e);
    });

    viewer.addEventListener('ar-status', (event) => {
      console.log('AR status:', event.detail.status);
    });
  </script>

</body>
</html>
