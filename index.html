<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AR Modelo 3D</title>
	<style>
		* { margin: 0; padding: 0; }
		body {
			font-family: Monospace;
			background-color: #000;
			color: #fff;
			margin: 0px;
			overflow: hidden;
		}
		#info {
			position: absolute;
			top: 0;
			width: 100%;
			padding: 10px;
			box-sizing: border-box;
			text-align: center;
			background: rgba(0, 0, 0, 0.7);
		}
		button { 
			appearance: none;
			background: #0066cc;
			border: none;
			color: white;
			padding: 12px 24px;
			margin: 10px;
			border-radius: 4px;
			cursor: pointer;
			font-size: 16px;
			position: absolute;
			bottom: 20px;
			right: 20px;
			z-index: 100;
		}
		button:hover { background: #0052a3; }
		button.active { background: #00aa00; }
		#error {
			position: absolute;
			top: 60px;
			left: 20px;
			background: rgba(255, 0, 0, 0.8);
			color: white;
			padding: 15px;
			border-radius: 4px;
			max-width: 300px;
			display: none;
			z-index: 1000;
		}
	</style>
</head>
<body>

	<div id="info">
		<div id="message">Cargando modelo...</div>
		<div id="instructions" style="display:none;">
			👆 1 dedo para rotar | ✌️ 2 dedos para escalar
		</div>
	</div>
	<div id="error"></div>

	<button id="XRButton" disabled>XR no soportado</button>

	<script type="importmap">
		{
			"imports": {
				"three": "https://cdn.jsdelivr.net/npm/three@r128/build/three.module.js",
				"three/addons/": "https://cdn.jsdelivr.net/npm/three@r128/examples/jsm/"
			}
		}
	</script>

	<script type="module">
		import * as THREE from 'three';
		import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
		import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

		console.log('🚀 Iniciando AR...');

		const MODELO_URL = '/prueba1/modelo.glb';

		let scene, camera, renderer;
		let controller, controllerGrip;
		let model = null;
		let isModelPlaced = false;
		let selectedObject = null;

		const messageDiv = document.getElementById('message');
		const instructionsDiv = document.getElementById('instructions');
		const errorDiv = document.getElementById('error');
		const XRButton = document.getElementById('XRButton');

		// Gestos táctiles
		let touchStart = { x: 0, y: 0, distance: 0 };
		let isRotating = false;

		function showError(msg) {
			console.error('❌', msg);
			errorDiv.textContent = msg;
			errorDiv.style.display = 'block';
		}

		function init() {
			try {
				console.log('📍 Inicializando Three.js...');

				const canvas = document.createElement('canvas');
				document.body.appendChild(canvas);

				scene = new THREE.Scene();
				scene.background = new THREE.Color(0x000000);

				camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
				camera.position.z = 0;

				renderer = new THREE.WebGLRenderer({ 
					antialias: true, 
					alpha: true,
					canvas: canvas,
					xrCompatible: true 
				});
				renderer.setPixelRatio(window.devicePixelRatio);
				renderer.setSize(window.innerWidth, window.innerHeight);
				renderer.xr.enabled = true;
				renderer.xr.setReferenceSpaceType('local');

				console.log('✅ Renderer creado');

				// Luces
				const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
				scene.add(light);

				const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
				directionalLight.position.set(5, 10, 5);
				scene.add(directionalLight);

				console.log('✅ Luces agregadas');

				// Cargar modelo
				const loader = new GLTFLoader();
				loader.load(MODELO_URL, (gltf) => {
					model = gltf.scene;
					model.scale.set(0.5, 0.5, 0.5);
					model.position.set(0, 0, -2);

					model.traverse((child) => {
						if (child.isMesh) {
							child.castShadow = true;
							child.receiveShadow = true;
						}
					});

					messageDiv.textContent = '✅ Modelo cargado. Tap "Iniciar AR"';
					console.log('✅ Modelo cargado correctamente');
				}, 
				(progress) => {
					const percent = Math.round((progress.loaded / progress.total) * 100);
					messageDiv.textContent = `📦 Cargando: ${percent}%`;
					console.log(`Cargando: ${percent}%`);
				},
				(error) => {
					showError('Error cargando modelo: ' + error.message);
					messageDiv.textContent = '❌ Error cargando modelo';
				});

				// Setup XR
				if (navigator.xr) {
					navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
						if (supported) {
							XRButton.disabled = false;
							XRButton.textContent = 'Iniciar AR';
							XRButton.addEventListener('click', onXRButtonClick);
							console.log('✅ WebXR soportado');
						} else {
							showError('AR no soportado en este dispositivo');
							messageDiv.textContent = '❌ AR no soportado';
						}
					});
				} else {
					showError('WebXR no disponible en este navegador');
					messageDiv.textContent = '❌ WebXR no disponible';
				}

				// Render loop
				renderer.setAnimationLoop((time, frame) => {
					if (model && !isModelPlaced) {
						model.rotation.y += 0.005;
					}
					renderer.render(scene, camera);
				});

				// Gestores táctiles
				document.addEventListener('touchstart', onTouchStart, false);
				document.addEventListener('touchmove', onTouchMove, false);
				document.addEventListener('touchend', onTouchEnd, false);

				// Responsive
				window.addEventListener('resize', onWindowResize);

				console.log('✅ Three.js inicializado correctamente');
			} catch (err) {
				showError('Error init: ' + err.message);
				console.error('Error completo:', err);
			}
		}

		async function onXRButtonClick() {
			try {
				const session = await navigator.xr.requestSession('immersive-ar', {
					requiredFeatures: ['hit-test', 'dom-overlay'],
					optionalFeatures: ['dom-overlay-for-handheld-ar'],
					domOverlay: { root: document.body }
				});

				XRButton.textContent = '❌ Salir AR';
				XRButton.classList.add('active');
				messageDiv.textContent = '👆 Toca el suelo para colocar el objeto';
				instructionsDiv.style.display = 'block';

				session.addEventListener('select', onXRSelect);
				session.addEventListener('end', onXREnd);

				renderer.xr.setSession(session);
				XRButton.addEventListener('click', () => session.end());

				console.log('✅ Sesión AR iniciada');
			} catch (err) {
				showError('Error AR: ' + err.message);
				console.error('Error completo:', err);
			}
		}

		function onXRSelect(event) {
			const session = event.session;
			const frame = event.frame;
			const inputSource = event.inputSource;

			const hitTestResults = frame.getHitTestResults(inputSource);

			if (hitTestResults.length > 0 && model && !isModelPlaced) {
				const hit = hitTestResults[0];
				const pose = hit.getPose(frame.session.inputSpace);

				if (pose) {
					model.position.setFromMatrixPosition(pose.transform.matrix);
					scene.add(model);
					isModelPlaced = true;
					selectedObject = model;

					messageDiv.textContent = '✅ Objeto colocado';
					console.log('✅ Objeto colocado en AR');
				}
			}
		}

		function onXREnd() {
			XRButton.textContent = 'Iniciar AR';
			XRButton.classList.remove('active');
			messageDiv.textContent = '✅ Modelo cargado. Tap "Iniciar AR"';
			instructionsDiv.style.display = 'none';
			isModelPlaced = false;
			selectedObject = null;
			console.log('✅ AR cerrado');
		}

		function onTouchStart(event) {
			if (event.touches.length === 1 && isModelPlaced) {
				touchStart = {
					x: event.touches[0].clientX,
					y: event.touches[0].clientY,
					distance: 0
				};
				isRotating = true;
			} else if (event.touches.length === 2 && isModelPlaced) {
				const dx = event.touches[0].clientX - event.touches[1].clientX;
				const dy = event.touches[0].clientY - event.touches[1].clientY;
				touchStart.distance = Math.sqrt(dx * dx + dy * dy);
				isRotating = false;
			}
		}

		function onTouchMove(event) {
			if (!selectedObject || !isModelPlaced) return;

			if (event.touches.length === 1 && isRotating) {
				const deltaX = event.touches[0].clientX - touchStart.x;
				const deltaY = event.touches[0].clientY - touchStart.y;

				selectedObject.rotation.y += deltaX * 0.01;
				selectedObject.rotation.x += deltaY * 0.01;

				touchStart.x = event.touches[0].clientX;
				touchStart.y = event.touches[0].clientY;

			} else if (event.touches.length === 2) {
				const dx = event.touches[0].clientX - event.touches[1].clientX;
				const dy = event.touches[0].clientY - event.touches[1].clientY;
				const newDistance = Math.sqrt(dx * dx + dy * dy);

				if (touchStart.distance > 0) {
					const scale = newDistance / touchStart.distance;
					selectedObject.scale.multiplyScalar(scale);

					const currentScale = selectedObject.scale.x;
					if (currentScale < 0.2) selectedObject.scale.set(0.2, 0.2, 0.2);
					if (currentScale > 3) selectedObject.scale.set(3, 3, 3);
				}

				touchStart.distance = newDistance;
			}
		}

		function onTouchEnd(event) {
			isRotating = false;
			touchStart.distance = 0;
		}

		function onWindowResize() {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		}

		console.log('🚀 Cargando AR Viewer...');
		init();

	</script>

</body>
</html>
