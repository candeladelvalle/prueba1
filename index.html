<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AR 3D</title>
	<style>
		body { margin: 0; background: #000; }
		canvas { display: block; }
		#info {
			position: fixed;
			top: 10px;
			left: 50%;
			transform: translateX(-50%);
			background: rgba(0,0,0,0.8);
			color: white;
			padding: 10px 20px;
			border-radius: 4px;
			text-align: center;
			z-index: 10;
		}
		#btn {
			position: fixed;
			bottom: 20px;
			right: 20px;
			padding: 12px 24px;
			background: #0066cc;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			z-index: 100;
			font-size: 16px;
		}
		#btn:hover { background: #0052a3; }
		#btn.active { background: #00aa00; }
		#error {
			position: fixed;
			top: 60px;
			left: 20px;
			background: rgba(255,0,0,0.9);
			color: white;
			padding: 15px;
			border-radius: 4px;
			max-width: 300px;
			display: none;
		}
	</style>
</head>
<body>
	<div id="info">Cargando Three.js...</div>
	<div id="error"></div>
	<button id="btn" disabled>XR no soportado</button>

	<!-- Cargar Three.js de cdnjs (más confiable) -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

	<script>
		// Esperar a que TODO se cargue antes de ejecutar
		window.addEventListener('load', function() {
			console.log('🚀 Iniciando...');
			
			// Verificar que THREE está disponible
			if (typeof THREE === 'undefined') {
				document.getElementById('error').textContent = '❌ Three.js no se cargó. Verifica tu conexión.';
				document.getElementById('error').style.display = 'block';
				console.error('THREE is not defined');
				return;
			}
			
			console.log('✅ THREE cargado, versión:', THREE.REVISION);
			
			if (typeof THREE.GLTFLoader === 'undefined') {
				document.getElementById('error').textContent = '❌ GLTFLoader no se cargó.';
				document.getElementById('error').style.display = 'block';
				console.error('THREE.GLTFLoader is not defined');
				return;
			}
			
			console.log('✅ GLTFLoader cargado');

			const MODELO_URL = '/prueba1/modelo.glb';
			let scene, camera, renderer, model;
			let xrSession = null;
			let modelPlaced = false;

			const info = document.getElementById('info');
			const btn = document.getElementById('btn');
			const error = document.getElementById('error');

			let touchStart = { x: 0, y: 0, dist: 0 };
			let rotating = false;

			function showError(msg) {
				console.error('❌', msg);
				error.textContent = msg;
				error.style.display = 'block';
			}

			function init() {
				try {
					console.log('📍 Inicializando...');

					scene = new THREE.Scene();
					scene.background = new THREE.Color(0x000000);

					camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
					camera.position.z = 0;

					renderer = new THREE.WebGLRenderer({ 
						antialias: true,
						alpha: true
					});
					renderer.setSize(innerWidth, innerHeight);
					renderer.xr.enabled = true;
					document.body.appendChild(renderer.domElement);

					console.log('✅ Renderer OK');

					scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));
					const light = new THREE.DirectionalLight(0xffffff, 0.8);
					light.position.set(5, 10, 5);
					scene.add(light);

					const loader = new THREE.GLTFLoader();
					info.textContent = 'Cargando modelo...';
					
					loader.load(MODELO_URL, (gltf) => {
						model = gltf.scene;
						model.scale.set(0.5, 0.5, 0.5);
						model.position.z = -2;
						model.traverse(child => {
							if (child.isMesh) {
								child.castShadow = true;
								child.receiveShadow = true;
							}
						});
						info.textContent = '✅ Tap "Iniciar AR"';
						console.log('✅ Modelo OK');
					}, 
					(progress) => {
						const percent = Math.round((progress.loaded / progress.total) * 100);
						info.textContent = `Cargando: ${percent}%`;
					},
					err => {
						showError('Error modelo: ' + err.message);
					});

					if (navigator.xr) {
						navigator.xr.isSessionSupported('immersive-ar').then(supported => {
							if (supported) {
								btn.disabled = false;
								btn.textContent = 'Iniciar AR';
								btn.onclick = startAR;
								console.log('✅ WebXR OK');
							} else {
								showError('AR no soportado en este dispositivo');
							}
						});
					} else {
						showError('WebXR no disponible');
					}

					renderer.setAnimationLoop((time, frame) => {
						if (model && !modelPlaced) {
							model.rotation.y += 0.005;
						}
						renderer.render(scene, camera);
					});

					document.addEventListener('touchstart', e => {
						if (!modelPlaced) return;
						if (e.touches.length === 1) {
							rotating = true;
							touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
						} else if (e.touches.length === 2) {
							const dx = e.touches[0].clientX - e.touches[1].clientX;
							const dy = e.touches[0].clientY - e.touches[1].clientY;
							touchStart.dist = Math.sqrt(dx*dx + dy*dy);
							rotating = false;
						}
					});

					document.addEventListener('touchmove', e => {
						if (!modelPlaced || !model) return;
						if (e.touches.length === 1 && rotating) {
							const dx = e.touches[0].clientX - touchStart.x;
							const dy = e.touches[0].clientY - touchStart.y;
							model.rotation.y += dx * 0.01;
							model.rotation.x += dy * 0.01;
							touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
						} else if (e.touches.length === 2) {
							const dx = e.touches[0].clientX - e.touches[1].clientX;
							const dy = e.touches[0].clientY - e.touches[1].clientY;
							const dist = Math.sqrt(dx*dx + dy*dy);
							if (touchStart.dist > 0) {
								const scale = dist / touchStart.dist;
								model.scale.multiplyScalar(scale);
								const s = model.scale.x;
								if (s < 0.2) model.scale.set(0.2, 0.2, 0.2);
								if (s > 3) model.scale.set(3, 3, 3);
							}
							touchStart.dist = dist;
						}
					});

					document.addEventListener('touchend', () => {
						rotating = false;
						touchStart.dist = 0;
					});

					window.addEventListener('resize', () => {
						camera.aspect = innerWidth / innerHeight;
						camera.updateProjectionMatrix();
						renderer.setSize(innerWidth, innerHeight);
					});

					console.log('✅ Init OK');
				} catch (e) {
					showError('Error init: ' + e.message);
					console.error(e);
				}
			}

			async function startAR() {
				try {
					console.log('📍 Iniciando AR...');
					const session = await navigator.xr.requestSession('immersive-ar', {
						requiredFeatures: ['hit-test'],
						optionalFeatures: ['dom-overlay'],
						domOverlay: { root: document.body }
					});

					xrSession = session;
					btn.textContent = '❌ Salir';
					btn.classList.add('active');
					btn.onclick = () => session.end();
					info.textContent = '👆 Toca para colocar';

					session.addEventListener('select', e => {
						const frame = e.frame;
						const results = frame.getHitTestResults(e.inputSource);
						if (results.length > 0 && model && !modelPlaced) {
							const pose = results[0].getPose(frame.session.inputSpace);
							model.position.setFromMatrixPosition(pose.transform.matrix);
							scene.add(model);
							modelPlaced = true;
							info.textContent = '✅ 1 dedo: rota | 2 dedos: escala';
							console.log('✅ Colocado');
						}
					});

					session.addEventListener('end', () => {
						btn.textContent = 'Iniciar AR';
						btn.classList.remove('active');
						btn.onclick = startAR;
						info.textContent = '✅ Tap "Iniciar AR"';
						modelPlaced = false;
						console.log('✅ AR terminado');
					});

					renderer.xr.setSession(session);
					console.log('✅ AR activo');
				} catch (e) {
					showError('Error AR: ' + e.message);
					console.error(e);
				}
			}

			init();
		});
	</script>
</body>
</html>
